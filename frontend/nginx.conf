# Nginx config for React SPA served inside the frontend container
server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # All routes fall back to index.html (BrowserRouter support)
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Static assets with aggressive caching
    location ~* \.(js|css|ico|png|svg|webp|woff2?)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml;
}
