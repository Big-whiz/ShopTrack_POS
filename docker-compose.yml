services:
  db:
    image: postgres:16-alpine
    container_name: shoptrack_db
    restart: always
    env_file:
      - ./backend/.env
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB" ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - shoptrack_net

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: shoptrack_backend
    restart: always
    env_file:
      - ./backend/.env
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./backend:/app
    networks:
      - shoptrack_net
    expose:
      - "8000"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: shoptrack_frontend
    restart: always
    depends_on:
      - backend
    networks:
      - shoptrack_net
    expose:
      - "80"

  nginx:
    image: nginx:1.25-alpine
    container_name: shoptrack_nginx
    restart: always
    ports:
      - "80:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend
      - frontend
    networks:
      - shoptrack_net

volumes:
  postgres_data:


networks:
  shoptrack_net:
    driver: bridge
